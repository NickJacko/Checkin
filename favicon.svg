<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#08080f"/>
    </radialGradient>
    <linearGradient id="hat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Wizard hat brim -->
  <ellipse cx="32" cy="43" rx="18" ry="4.5" fill="url(#hat)"/>
  <!-- Wizard hat body -->
  <polygon points="32,10 18,43 46,43" fill="url(#hat)"/>
  <!-- Hat highlight -->
  <polygon points="32,10 26,30 38,30" fill="rgba(255,255,255,0.12)"/>
  <!-- Star on hat -->
  <polygon points="32,17 33.5,21.5 38,21.5 34.3,24.3 35.8,28.8 32,26 28.2,28.8 29.7,24.3 26,21.5 30.5,21.5" fill="url(#star)" opacity="0.9"/>
  <!-- Sparkles -->
  <circle cx="14" cy="22" r="1.5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="50" cy="18" r="1" fill="#a855f7" opacity="0.9"/>
  <circle cx="48" cy="30" r="1.2" fill="#fbbf24" opacity="0.7"/>
  <circle cx="16" cy="35" r="1" fill="#a855f7" opacity="0.8"/>
</svg>
